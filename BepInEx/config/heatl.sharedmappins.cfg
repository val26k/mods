## Settings file was created by plugin SharedMapPins v1.1.0
## Plugin GUID: heatl.sharedmappins

[Client]

## Client: share your own pins and receive pins from the server.
# Setting type: Boolean
# Default value: true
ParticipateInPinSync = true

[Server]

## Server/host: allow map pin synchronization for all connected players.
# Setting type: Boolean
# Default value: true
AllowPinSync = true

## Server: pins closer than this distance with the same type (and optionally name) are treated as duplicates. Synced to clients.
# Setting type: Single
# Default value: 5
DuplicatePinRadius = 5

## Server: pins must also share the same name to count as duplicates. Synced to clients.
# Setting type: Boolean
# Default value: true
MatchPinNameForDuplicates = true

