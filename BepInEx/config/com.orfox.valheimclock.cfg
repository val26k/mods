## Settings file was created by plugin Valheim Clock v1.5.2
## Plugin GUID: com.orfox.valheimclock

[General]

## If true, displays the clock in a 12-hour format with AM/PM instead of 24-hour format time.
# Setting type: Boolean
# Default value: false
Use12HourFormat = false

## If true, displays the current weather/environment alongside the time.
# Setting type: Boolean
# Default value: false
Show Weather = true

## If true, displays a progress bar at the bottom tracking the day/night cycle.
# Setting type: Boolean
# Default value: false
Show Time Slider = true

[Position]

## Horizontal offset relative to the bottom center of the minimap.
# Setting type: Single
# Default value: 0
Offset X = 0

## Vertical offset relative to the bottom center of the minimap.
# Setting type: Single
# Default value: -10
Offset Y = -10

[Visuals]

## Width of the clock panel.
# Setting type: Single
# Default value: 160
Panel Width = 110

## Height of the clock panel.
# Setting type: Single
# Default value: 34
Panel Height = 26

## Size of the clock text.
# Setting type: Int32
# Default value: 18
Font Size = 12

## Size of the weather text.
# Setting type: Int32
# Default value: 14
Weather Font Size = 10

## Day and time arrangement.
# Setting type: TextLayoutStyle
# Default value: SingleLine
# Acceptable values: SingleLine, Stacked
Text Layout = SingleLine

## Color theme of the clock UI and slider.
# Setting type: ClockTheme
# Default value: Valheim
# Acceptable values: Valheim, Blood, Ocean, Nature, Monochrome
Theme = Valheim

