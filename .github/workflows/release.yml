name: Release modpack

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from commit
        id: version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          TITLE=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          VERSION=$(echo "$TITLE" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+' || true)
          if [ -z "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version prefix in commit title, skipping release."
            exit 0
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Found version: $VERSION"

      - name: Check if tag already exists
        if: steps.version.outputs.skip != 'true'
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags origin
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.version.outputs.skip != 'true' && steps.tag_check.outputs.skip != 'true'
        id: notes
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BODY=$(printf '%s' "$COMMIT_MESSAGE" | tail -n +2)
          git fetch --tags origin

          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "^${TAG}$" | head -n1 || true)

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            CHANGELOG="**Full Changelog**: https://github.com/${{ github.repository }}/commits/${TAG}"
          fi

          if [ -n "$BODY" ]; then
            NOTES="${BODY}

          ${CHANGELOG}"
          else
            NOTES="${CHANGELOG}"
          fi

          {
            echo "body<<EOF"
            printf '%s\n' "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release zip
        if: steps.version.outputs.skip != 'true' && steps.tag_check.outputs.skip != 'true'
        run: |
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".cursor/*" \
            -x ".cursorrules" \
            -x ".gitignore" \
            -x "release.zip"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true' && steps.tag_check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: release.zip
          generate_release_notes: false
